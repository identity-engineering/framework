# Deploy website/ to Cloudflare Pages via Wrangler.
# Production: push to main (website/** or this workflow).

name: Deploy Cloudflare Pages

on:
  push:
    branches:
      - main
    paths:
      - 'website/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        working-directory: website
        run: npm ci --legacy-peer-deps

      - name: Build Astro site
        working-directory: website
        run: npm run build

      - name: Verify Wrangler auth
        working-directory: website
        run: npx --yes wrangler@4.112.0 whoami

      - name: Deploy to Cloudflare Pages
        working-directory: website
        run: |
          npx --yes wrangler@4.112.0 pages deploy dist \
            --project-name=identity-engineering \
            --branch=main \
            --commit-hash="${{ github.sha }}" \
            --commit-message="ci deploy ${{ github.sha }}"
