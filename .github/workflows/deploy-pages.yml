# Deploy website/ to Cloudflare Pages via Wrangler.
# Temporary: also runs on fix/three-timer-cf-pipeline for pipeline validation.
# After green run on fix branch → switch triggers to main only.

name: Deploy Cloudflare Pages

on:
  push:
    branches:
      - main
      - fix/three-timer-cf-pipeline
    paths:
      - 'website/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    defaults:
      run:
        working-directory: website
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build Astro site
        run: npm run build

      # Use npx wrangler (not wrangler-action npm i into project — peer dep conflicts with Astro 7)
      - name: Deploy to Cloudflare Pages
        run: >
          npx --yes wrangler@4.27.0 pages deploy dist
          --project-name=identity-engineering
          --branch=${{ github.ref_name }}
          --commit-hash=${{ github.sha }}
          --commit-message=${{ github.event.head_commit.message || github.ref_name }}
